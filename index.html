<head>

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="TÉFA — Premium African Fashion | Handcrafted in Lagos">
    <meta name="twitter:description"
        content="Discover TÉFA — premium African fashion for the bold and beautiful. Handcrafted kaftans, ankara sets, gowns, and accessories from Lagos, Nigeria.">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👗</text></svg>">

    <!-- DNS Prefetch for external domains -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="dns-prefetch" href="https://firebaseapp.com">

    <!-- Preconnect to Google Fonts and Cloudinary -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://res.cloudinary.com">

    <!-- Preload critical hero image (first slide) -->
    <link rel="preload" as="image" href="/assets/Hero/Screenshot 2026-02-06 at 13.44.48.jpg" type="image/jpeg">

    <!-- Preload critical font (Montserrat for the logo) -->
    <link rel="preload" href="https://fonts.gstatic.com/s/montserrat/v29/JTUSjIg1_i6t8kCHKm459Wlhyw.woff2" as="font"
        type="font/woff2" crossorigin>

    <!-- Google Fonts: Optimized selection (Inter, Cormorant Garamond, Montserrat) -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Montserrat:wght@500;700;800&display=swap"
        rel="stylesheet">

    <!-- Critical CSS for Hero & Branding -->
    <style>
        :root {
            --color-cream: #FFFFFF;
            --color-text: #111111;
            --color-coral: #111111;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--color-cream);
            color: var(--color-text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #eee;
        }

        .hero-logo-target {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>

    <!-- JSON-LD: Organization + WebSite -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@graph": [
            {
                "@type": "Organization",
                "@id": "https://houseoftefa.com/#organization",
                "name": "TÉFA",
                "url": "https://houseoftefa.com",
                "logo": {
                    "@type": "ImageObject",
                    "url": "https://houseoftefa.com/assets/Hero/Screenshot 2026-02-06 at 13.44.48.jpg"
                },
                "description": "Premium African fashion for the bold and beautiful. Handcrafted in Lagos, Nigeria.",
                "email": "hello@houseoftefa.com",
                "telephone": "+2348135407871",
                "address": {
                    "@type": "PostalAddress",
                    "addressLocality": "Lagos",
                    "addressCountry": "NG"
                },
                "sameAs": [
                    "https://www.instagram.com/shop.tefa"
                ]
            },
            {
                "@type": "WebSite",
                "@id": "https://houseoftefa.com/#website",
                "name": "TÉFA",
                "url": "https://houseoftefa.com",
                "description": "Premium African fashion for the bold and beautiful. Handcrafted in Lagos, Nigeria.",
                "publisher": {
                    "@id": "https://houseoftefa.com/#organization"
                },
                "potentialAction": {
                    "@type": "SearchAction",
                    "target": "https://houseoftefa.com/shop?q={search_term_string}",
                    "query-input": "required name=search_term_string"
                }
            }
        ]
    }
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
