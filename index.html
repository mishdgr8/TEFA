<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="TÉFA — Premium African fashion for the bold and beautiful. Handcrafted kaftans, ankara sets, gowns, and accessories from Lagos, Nigeria.">
    <meta name="keywords"
        content="African fashion, TÉFA, kaftans, ankara, dresses, gowns, Lagos fashion, African boutique, African luxury, Nigerian fashion, handcrafted clothing">
    <meta name="theme-color" content="#111111">
    <meta name="author" content="TÉFA">
    <meta name="application-name" content="TÉFA">
    <meta name="apple-mobile-web-app-title" content="TÉFA">

    <title>TÉFA — Premium African Fashion | Handcrafted in Lagos</title>

    <!-- Preconnect to critical domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://res.cloudinary.com">
    <link rel="preconnect" href="https://apis.google.com">
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://tefa-africana.firebaseapp.com">

    <!-- Preload critical fonts -->
    <link rel="preload" href="/assets/rethena/RethenaDemo.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="/assets/lc_sac/LCSacTrial-Regular.ttf" as="font" type="font/ttf" crossorigin>

    <!-- Preload LCP Hero Image (Responsive & Optimized) -->
    <link rel="preload" as="image"
        href="https://res.cloudinary.com/dzfrrcacc/image/upload/f_auto,q_auto,w_1200/v1/TEFA/assets/Hero/Screenshot%202026-02-06%20at%2013.44.48"
        imagesrcset="https://res.cloudinary.com/dzfrrcacc/image/upload/f_auto,q_auto,w_640/v1/TEFA/assets/Hero/Screenshot%202026-02-06%20at%2013.44.48 640w, https://res.cloudinary.com/dzfrrcacc/image/upload/f_auto,q_auto,w_828/v1/TEFA/assets/Hero/Screenshot%202026-02-06%20at%2013.44.48 828w, https://res.cloudinary.com/dzfrrcacc/image/upload/f_auto,q_auto,w_1080/v1/TEFA/assets/Hero/Screenshot%202026-02-06%20at%2013.44.48 1080w, https://res.cloudinary.com/dzfrrcacc/image/upload/f_auto,q_auto,w_1200/v1/TEFA/assets/Hero/Screenshot%202026-02-06%20at%2013.44.48 1200w"
        imagesizes="100vw" fetchpriority="high">

    <!-- Google Fonts: Non-render-blocking -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@500;700&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@500;700&display=swap"
            rel="stylesheet">
    </noscript>

    <!-- Inlined Main CSS (Eliminates Render Blocking) -->
    <style>
        /* ─── Custom Fonts ─── */
        @font-face {
            font-family: 'LC SAC';
            src: url('/assets/lc_sac/LCSacTrial-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Rethena';
            src: url('/assets/rethena/RethenaDemo.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --color-coral: #111111;
            --color-coral-dark: #000000;
            --color-cream: #FFFFFF;
            --color-text: #111111;
            --color-nude: #F0F0F0;
            --radius-full: 9999px;
            --space-4: 16px;
            --space-8: 32px;
            --transition-base: 250ms ease;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--color-cream);
            color: var(--color-text);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Hero & Critical Components */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #fafafa;
        }

        .hero-logo-target {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-4) var(--space-8);
            border-radius: var(--radius-full);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-base);
            text-decoration: none;
        }

        .btn-primary {
            background: var(--color-coral);
            color: white;
        }

        /* ═══════════════════════════════════════════════════════════════════════════
           Core Design System (Condensed for Inlining)
           ═══════════════════════════════════════════════════════════════════════════ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        h1,
        h2,
        h3 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 var(--space-4);
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>

    <!-- JSON-LD: Organization + WebSite -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@graph": [
            {
                "@type": "Organization",
                "@id": "https://houseoftefa.com/#organization",
                "name": "TÉFA",
                "url": "https://houseoftefa.com",
                "logo": {
                    "@type": "ImageObject",
                    "url": "https://res.cloudinary.com/dzfrrcacc/image/upload/f_auto,q_auto,w_800/v1/TEFA/assets/Hero/Screenshot 2026-02-06 at 13.44.48"
                },
                "description": "Premium African fashion for the bold and beautiful. Handcrafted in Lagos, Nigeria."
            },
            {
                "@type": "WebSite",
                "@id": "https://houseoftefa.com/#website",
                "name": "TÉFA",
                "url": "https://houseoftefa.com",
                "publisher": { "@id": "https://houseoftefa.com/#organization" }
            }
        ]
    }
    </script>
</head>

<body>
    <div id="root"></div>
    <!-- Load JS at the end, module scripts are deferred by default -->
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
